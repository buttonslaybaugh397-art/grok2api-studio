name: grok2api-studio

services:
  studio:
    container_name: grok2api-studio
    image: ${STUDIO_IMAGE:-ghcr.io/buttonslaybaugh397-art/ai-studio:latest}
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "${STUDIO_PORT:-4175}:4175"
    environment:
      HOST: 0.0.0.0
      PORT: 4175
      STUDIO_PROXY_TARGET: ${STUDIO_PROXY_TARGET:-http://host.docker.internal:8000}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped

